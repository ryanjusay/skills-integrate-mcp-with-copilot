<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="location-controls">
          <h4>Find Nearby Events</h4>
          <div class="location-buttons">
            <button id="use-current-location" type="button">Use Current Location</button>
          </div>
          <div class="form-group">
            <label for="latitude">Latitude:</label>
            <input type="number" id="latitude" step="any" placeholder="e.g. 47.6062" />
          </div>
          <div class="form-group">
            <label for="longitude">Longitude:</label>
            <input type="number" id="longitude" step="any" placeholder="e.g. -122.3321" />
          </div>
          <div class="form-group">
            <label for="radius-km">Radius (km):</label>
            <input type="number" id="radius-km" min="1" value="10" />
          </div>
          <div class="location-buttons">
            <button id="find-nearby" type="button">Find Nearby Events</button>
            <button id="show-all" type="button">Show All Events</button>
          </div>
        </div>
        <div id="map" aria-label="Nearby events map"></div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
